apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-demo
  template:
    metadata:
      labels:
        app: html-demo
    spec:
      containers:
      - name: html-demo
        image: 23mis0625/html-demo:latest
        imagePullPolicy: Always  # Crucial to pull the new image every time
        ports:
        - containerPort: 80      # Standard port for HTML/Nginx
---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service
spec:
  type: NodePort
  selector:
    app: html-demo
  ports:
    - port: 80            # The port the service exposes inside the cluster
      targetPort: 80      # MUST match the containerPort above
      nodePort: 30014     # The port you visit in your browser (e.g., localhost:30014)
